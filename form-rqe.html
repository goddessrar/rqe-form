  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2enRmbHhqcmh0bXBmbm95cGhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM3MzkzMDcsImV4cCI6MjA3OTMxNTMwN30.7yNqGcFd89GfOjTNKp2VTQljLhZlcn4h-9J83LSykeg';

  const QUESTIONS = [
    {
      "id": "welcome",

      "title": "Admisión: Diplomatura en Reprogramación de la Percepción",
      "description": "Este formulario nos ayudará a conocer tu perfil y entender si este proceso de transformación es el indicado para vos en este momento.",
      "cta": "Comenzar admisión"
    },
    {"id":"q-1774372873036-0","title":"¿Cuál es tu profesión o área de trabajo?","description":"Queremos entender si hoy ya acompañas procesos de otras personas desde un rol profesional.","type":"multiple-choice","required":true,"options":[{"id":"opt-1774372873036-0-0","label":"Terapeuta (psicólogo, psicoterapeuta, etc.)","score":100},{"id":"opt-1774372873036-0-1","label":"Coach (vida, ejecutivo, transformacional)","score":100},{"id":"opt-1774372873036-0-2","label":"Médico o profesional de la salud","score":95},{"id":"opt-1774372873036-0-3","label":"Consultor o asesor empresarial","score":75},{"id":"opt-1774372873036-0-4","label":"Emprendedor/Empresario","score":65},{"id":"opt-1774372873036-0-5","label":"Otro","score":35}],"allowOther":false},
    {"id":"q-1774372873036-1","title":"¿Cuál de estas frases describe mejor tu situación actual?","description":"Buscamos entender si estás en un momento real de búsqueda, transformación y profundidad.","type":"multiple-choice","required":true,"options":[{"id":"opt-1774372873036-1-0","label":"Soy funcional profesionalmente, pero siento que hay algo que no cierra en mi vida o en mi trabajo","score":85},{"id":"opt-1774372873036-1-1","label":"Tengo clientes/pacientes pero siento que mis intervenciones alivian pero no transforman","score":100},{"id":"opt-1774372873036-1-2","label":"Busco un método estructurado para entender cómo funciona mi mente y mi percepción","score":90},{"id":"opt-1774372873036-1-3","label":"Quiero aprender a ser terapeuta con un método estructurado para acompañar procesos de otras personas","score":100},{"id":"opt-1774372873036-1-4","label":"Ninguna de las anteriores","score":0}],"allowOther":false},
    {"id":"q-1774372873036-2","title":"¿Cuándo te gustaría comenzar la Diplomatura?","description":"Esto nos ayuda a medir tu nivel de urgencia y disposición real para iniciar el proceso.","type":"multiple-choice","required":true,"options":[{"id":"opt-1774372873036-2-0","label":"Inmediatamente","score":100},{"id":"opt-1774372873036-2-1","label":"En 2-3 meses","score":60},{"id":"opt-1774372873036-2-2","label":"Aún estoy explorando opciones","score":10}],"allowOther":false},
    {"id":"q-1774372873036-3","title":"La Diplomatura en Reprogramación de la Percepción es un proceso de 7 meses que requiere una inversión de tiempo, energía y recursos económicos.","description":"Queremos conocer tu disposición para invertir en un proceso profundo si tiene sentido para vos.","type":"multiple-choice","required":true,"options":[{"id":"opt-1774372873036-3-0","label":"Estoy dispuesto/a a invertir en un proceso profundo si es el indicado.","score":100},{"id":"opt-1774372873036-3-1","label":"Necesito comprender bien el valor antes de considerar una inversión.","score":65},{"id":"opt-1774372873036-3-2","label":"Solo estoy explorando opciones.","score":10}],"allowOther":false},
    {"id":"q-1774372873036-4","title":"¿Qué es lo que más te atrae de la Diplomatura RP?","description":"Cuéntanos brevemente qué estás buscando.","type":"long-text","required":true,"options":[],"allowOther":false},
    {"id":"q-1774372873036-5","title":"Aceptación de términos y condiciones","description":"La entrevista solo se confirmará si respondes al equipo del Instituto RQE.","type":"multiple-choice","required":true,"options":[{"id":"opt-1774372873036-5-0","label":"ACEPTO","score":100},{"id":"opt-1774372873036-5-1","label":"NO ACEPTO","score":0}],"allowOther":false}
  ];

  const SUCCESS_CONFIG = {"whatsappNumber":"12069664729"};

  const STYLES = {
    primary: '#284B5D',
    primaryHover: '#1D292E',
    bg: '#e9e9e9',
    cardBg: '#ffffff',
    text: '#1D292E',
    textSecondary: '#64748b',
    border: 'rgba(0, 0, 0, 0.08)',
    radiusLg: '24px',
    radiusSm: '12px',
    font: "'Poppins', sans-serif"
  };

  let currentStep = 0;
  let responses = {};
  let sessionId = 'session_' + Date.now();
  const container = document.getElementById('ff-form-' + FORM_CSS_ID);
  
  const styleEl = document.createElement('style');
  styleEl.textContent = `
    #ff-wrapper-${FORM_CSS_ID} { background: transparent; padding: 20px; box-sizing: border-box; display: flex; justify-content: center; align-items: center; min-height: 80vh; }
    .ff-card { background: ${STYLES.cardBg}; border-radius: ${STYLES.radiusLg}; padding: 40px; width: 100%; max-width: 550px; border: 1px solid ${STYLES.border}; box-shadow: 0 10px 30px rgba(0,0,0,0.04); font-family: ${STYLES.font}; }
    .ff-progress-bar { width: 100%; height: 4px; background: #eee; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    .ff-progress-fill { height: 100%; background: ${STYLES.primary}; transition: width 0.4s ease; }
    .ff-title { font-size: 26px; font-weight: 700; line-height: 1.2; margin-bottom: 12px; color: ${STYLES.primary}; }
    .ff-desc { color: ${STYLES.textSecondary}; margin-bottom: 30px; font-size: 16px; line-height: 1.5; }
    .ff-option { width: 100%; padding: 16px 20px; border-radius: ${STYLES.radiusSm}; border: 2px solid ${STYLES.border}; background: #fff; color: ${STYLES.text}; text-align: left; cursor: pointer; font-size: 16px; margin-bottom: 12px; transition: all 0.2s; font-family: inherit; }
    .ff-option:hover { border-color: ${STYLES.primary}; background: #f8f9fa; transform: translateY(-1px); }
    .ff-input { width: 100%; padding: 18px; border-radius: ${STYLES.radiusSm}; border: 2px solid ${STYLES.border}; background: #fcfcfc; font-size: 16px; font-family: inherit; margin-bottom: 25px; min-height: 120px; resize: none; }
    .ff-btn-main { background: ${STYLES.primary}; color: #fff; border: none; padding: 18px 32px; border-radius: ${STYLES.radiusSm}; font-weight: 600; cursor: pointer; width: 100%; font-size: 17px; transition: all 0.2s; }
    .ff-btn-main:hover { background: ${STYLES.primaryHover}; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
  `;
  document.head.appendChild(styleEl);

  function saveToDb(type, step) {
    fetch(SUPABASE_URL + '/rest/v1/form_events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY },
      body: JSON.stringify({ form_id: FORM_ID, event_type: type, step_number: step, session_id: sessionId })
    }).catch(() => {});
  }

  function render() {
    const q = QUESTIONS[currentStep];
    const isWelcome = q.type === 'welcome';
    const isLast = currentStep === QUESTIONS.length - 1;
    // El progreso no cuenta el paso de bienvenida para que la barra no empiece vacía
    const progress = isWelcome ? 0 : ((currentStep) / (QUESTIONS.length - 1)) * 100;

    let optionsHtml = '';
    if (isWelcome) {
      optionsHtml = `<button class="ff-btn-main" onclick="nextStep()">${q.cta}</button>`;
    } else if (q.type === 'multiple-choice') {
      optionsHtml = q.options.map(opt => `<button class="ff-option" onclick="handleInput('${opt.label}')">${opt.label}</button>`).join('');
    } else {
      optionsHtml = `<textarea id="ff-txt" class="ff-input" placeholder="Escribe aquí..."></textarea>
                     <button class="ff-btn-main" onclick="handleInput(document.getElementById('ff-txt').value)">${isLast ? 'Enviar y abrir WhatsApp' : 'Siguiente'}</button>`;
    }

    container.innerHTML = `
      <div class="ff-card">
        ${!isWelcome ? `<div class="ff-progress-bar"><div class="ff-progress-fill" style="width:${progress}%"></div></div>` : ''}
        <h2 class="ff-title">${q.title}</h2>
        <p class="ff-desc">${q.description}</p>
        ${optionsHtml}
      </div>`;
    saveToDb(isWelcome ? 'welcome_view' : 'step_view', currentStep);
  }

  window.handleInput = function(val) {
    if(!val || val.trim().length < 2) return alert("Por favor, completa tu respuesta.");
    responses[QUESTIONS[currentStep].title] = val;
    nextStep();
  };

  window.nextStep = function() {
    if (currentStep < QUESTIONS.length - 1) {
      currentStep++;
      render();
    } else {
      finish();
    }
  };

  function finish() {
    container.innerHTML = `<div class="ff-card" style="text-align:center"><h2>Redirigiendo a WhatsApp...</h2><p>Por favor espera un momento.</p></div>`;
    
    let msg = "Hola! Quiero aplicar a la Diplomatura. Aquí mis respuestas del formulario de admisión:\n\n";
    for (const [q, a] of Object.entries(responses)) {
      msg += `*${q}*\n${a}\n\n`;
    }
    
    const waUrl = `https://wa.me/${SUCCESS_CONFIG.whatsappNumber}?text=${encodeURIComponent(msg)}`;
    saveToDb('form_submit', 99);

    setTimeout(() => {
      window.top.location.href = waUrl;
    }, 600);
  }

  render();
  saveToDb('form_load', 0);
})();
</script>
