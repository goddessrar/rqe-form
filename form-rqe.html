    {"id":"q-1774372873036-0","title":"¿Cuál es tu profesión o área de trabajo?","description":"¿Acompañas hoy procesos de otras personas?","type":"multiple-choice","required":true,"options":[{"id":"opt-1774372873036-0-0","label":"Terapeuta","score":100},{"id":"opt-1774372873036-0-1","label":"Coach","score":100},{"id":"opt-1774372873036-0-2","label":"Médico / Salud","score":95},{"id":"opt-1774372873036-0-3","label":"Consultor / Asesor","score":75},{"id":"opt-1774372873036-0-4","label":"Emprendedor","score":65},{"id":"opt-1774372873036-0-5","label":"Otro","score":35}],"allowOther":false},
    {"id":"q-1774372873036-1","title":"¿Cuál es tu situación actual?","description":"Buscamos entender tu momento de búsqueda.","type":"multiple-choice","required":true,"options":[{"id":"opt-1774372873036-1-0","label":"Siento que algo no cierra en mi vida","score":85},{"id":"opt-1774372873036-1-1","label":"Mis intervenciones no transforman","score":100},{"id":"opt-1774372873036-1-2","label":"Busco un método estructurado","score":90},{"id":"opt-1774372873036-1-3","label":"Quiero aprender a ser terapeuta","score":100}],"allowOther":false},
    {"id":"q-1774372873036-2","title":"¿Cuándo te gustaría comenzar?","description":"Nivel de urgencia y disposición real.","type":"multiple-choice","required":true,"options":[{"id":"opt-1774372873036-2-0","label":"Inmediatamente","score":100},{"id":"opt-1774372873036-2-1","label":"En 2-3 meses","score":60},{"id":"opt-1774372873036-2-2","label":"Explorando opciones","score":10}],"allowOther":false},
    {"id":"q-1774372873036-3","title":"Sobre la inversión requerida","description":"¿Estás dispuesto/a a invertir en un proceso profundo?","type":"multiple-choice","required":true,"options":[{"id":"opt-1774372873036-3-0","label":"Estoy dispuesto/a a invertir.","score":100},{"id":"opt-1774372873036-3-1","label":"Necesito comprender el valor primero.","score":65},{"id":"opt-1774372873036-3-2","label":"Solo estoy explorando.","score":10}],"allowOther":false},
    {"id":"q-1774372873036-4","title":"¿Qué es lo que más te atrae?","description":"Cuéntanos brevemente qué estás buscando.","type":"long-text","required":true,"options":[],"allowOther":false},
    {"id":"q-1774372873036-5","title":"Términos y condiciones","description":"La entrevista se confirma vía WhatsApp.","type":"multiple-choice","required":true,"options":[{"id":"opt-1774372873036-5-0","label":"ACEPTO","score":100},{"id":"opt-1774372873036-5-1","label":"NO ACEPTO","score":0}],"allowOther":false}
  ];

  const SUCCESS_CONFIG = {"whatsappNumber":"12069664729"};

  const STYLES = {
    primary: '#284B5D',
    primaryHover: '#1D292E',
    bg: '#e9e9e9',
    cardBg: '#ffffff',
    text: '#1D292E',
    textSecondary: '#64748b',
    border: 'rgba(0, 0, 0, 0.08)',
    radiusLg: '20px',
    radiusSm: '10px',
    font: "'Poppins', sans-serif"
  };

  let currentStep = 0;
  let responses = {};
  let sessionId = 'session_' + Date.now();
  const container = document.getElementById('ff-form-' + FORM_CSS_ID);
  
  const styleEl = document.createElement('style');
  styleEl.textContent = `
    #ff-wrapper-${FORM_CSS_ID} { 
      background: transparent; 
      padding: 10px; 
      box-sizing: border-box; 
      display: flex; 
      justify-content: center; 
      align-items: flex-start;
      width: 100%;
    }
    .ff-card { 
      background: ${STYLES.cardBg}; 
      border-radius: ${STYLES.radiusLg}; 
      padding: 25px 20px; 
      width: 100%; 
      max-width: 480px; 
      border: 1px solid ${STYLES.border}; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
      font-family: ${STYLES.font}; 
      margin: 5px auto;
      box-sizing: border-box; /* Previene el desborde por padding */
    }
    .ff-progress-bar { width: 100%; height: 4px; background: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
    .ff-progress-fill { height: 100%; background: ${STYLES.primary}; transition: width 0.4s ease; }
    .ff-title { font-size: 21px; font-weight: 700; line-height: 1.2; margin-bottom: 8px; color: ${STYLES.primary}; }
    .ff-desc { color: ${STYLES.textSecondary}; margin-bottom: 20px; font-size: 14px; line-height: 1.4; }
    .ff-option { width: 100%; padding: 12px 16px; border-radius: ${STYLES.radiusSm}; border: 1.5px solid ${STYLES.border}; background: #fff; color: ${STYLES.text}; text-align: left; cursor: pointer; font-size: 15px; margin-bottom: 8px; transition: all 0.2s; font-family: inherit; box-sizing: border-box; }
    .ff-option:hover { border-color: ${STYLES.primary}; background: #f8f9fa; }
    .ff-input { width: 100%; padding: 14px; border-radius: ${STYLES.radiusSm}; border: 1.5px solid ${STYLES.border}; background: #fcfcfc; font-size: 15px; font-family: inherit; margin-bottom: 15px; min-height: 100px; resize: none; box-sizing: border-box; }
    .ff-btn-main { background: ${STYLES.primary}; color: #fff; border: none; padding: 15px 25px; border-radius: ${STYLES.radiusSm}; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; transition: all 0.2s; box-sizing: border-box; }
    .ff-btn-main:hover { background: ${STYLES.primaryHover}; transform: translateY(-1px); }

    /* Corrección para celulares extra pequeños */
    @media (max-width: 400px) {
      .ff-card { padding: 20px 15px; }
      .ff-title { font-size: 19px; }
      .ff-desc { font-size: 13px; }
    }
  `;
  document.head.appendChild(styleEl);

  function saveToDb(type, step) {
    fetch(SUPABASE_URL + '/rest/v1/form_events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY },
      body: JSON.stringify({ form_id: FORM_ID, event_type: type, step_number: step, session_id: sessionId })
    }).catch(() => {});
  }

  function render() {
    const q = QUESTIONS[currentStep];
    const isWelcome = q.type === 'welcome';
    const isLast = currentStep === QUESTIONS.length - 1;
    const progress = isWelcome ? 0 : ((currentStep) / (QUESTIONS.length - 1)) * 100;

    let optionsHtml = '';
    if (isWelcome) {
      optionsHtml = `<button class="ff-btn-main" onclick="nextStep()">${q.cta}</button>`;
    } else if (q.type === 'multiple-choice') {
      optionsHtml = q.options.map(opt => `<button class="ff-option" onclick="handleInput('${opt.label}')">${opt.label}</button>`).join('');
    } else {
      optionsHtml = `<textarea id="ff-txt" class="ff-input" placeholder="Escribe aquí..."></textarea>
                     <button class="ff-btn-main" onclick="handleInput(document.getElementById('ff-txt').value)">${isLast ? 'Enviar y abrir WhatsApp' : 'Siguiente'}</button>`;
    }

    container.innerHTML = `
      <div class="ff-card">
        ${!isWelcome ? `<div class="ff-progress-bar"><div class="ff-progress-fill" style="width:${progress}%"></div></div>` : ''}
        <h2 class="ff-title">${q.title}</h2>
        <p class="ff-desc">${q.description}</p>
        ${optionsHtml}
      </div>`;
    saveToDb(isWelcome ? 'welcome_view' : 'step_view', currentStep);
  }

  window.handleInput = function(val) {
    if(!val || val.trim().length < 2) return alert("Por favor, completa tu respuesta.");
    responses[QUESTIONS[currentStep].title] = val;
    nextStep();
  };

  window.nextStep = function() {
    if (currentStep < QUESTIONS.length - 1) {
      currentStep++;
      render();
    } else {
      finish();
    }
  };

  function finish() {
    container.innerHTML = `<div class="ff-card" style="text-align:center"><h2>Redirigiendo...</h2><p>Espera un momento.</p></div>`;
    let msg = "Hola! Quiero aplicar a la Diplomatura:\n\n";
    for (const [q, a] of Object.entries(responses)) {
      msg += `*${q}*\n${a}\n\n`;
    }
    const waUrl = `https://wa.me/${SUCCESS_CONFIG.whatsappNumber}?text=${encodeURIComponent(msg)}`;
    saveToDb('form_submit', 99);
    setTimeout(() => { window.top.location.href = waUrl; }, 600);
  }

  render();
  saveToDb('form_load', 0);
})();
</script>
