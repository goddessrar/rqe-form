<div id="ff-wrapper">
  <div id="ff-form"></div>
</div>

<script>
(function() {

const WHATSAPP_NUMBER = "5493411234567"; // 🔥 CAMBIÁ ESTO

const QUESTIONS = [
  {
    id: "q1",
    title: "¿Cuál es tu profesión o área de trabajo?",
    type: "multiple",
    options: [
      "Terapeuta",
      "Coach",
      "Profesional de la salud",
      "Consultor",
      "Emprendedor",
      "Otro"
    ]
  },
  {
    id: "q2",
    title: "¿Cuál de estas frases describe mejor tu situación actual?",
    type: "multiple",
    options: [
      "Siento que algo no cierra",
      "Tengo clientes pero no transformo",
      "Busco método estructurado",
      "Quiero ser terapeuta",
      "Ninguna"
    ]
  },
  {
    id: "q3",
    title: "¿Cuándo te gustaría comenzar?",
    type: "multiple",
    options: [
      "Inmediatamente",
      "En 2-3 meses",
      "Estoy explorando"
    ]
  },
  {
    id: "q4",
    title: "¿Qué te atrae de la diplomatura?",
    type: "text"
  }
];

let step = 0;
let responses = {};

const container = document.getElementById("ff-form");

const styles = `
  body { font-family: system-ui; }
  .card {
    background:#fff;
    border-radius:16px;
    padding:24px;
    border:1px solid rgba(0,0,0,0.05);
  }
  .title { font-size:22px; margin-bottom:16px; }
  .option {
    display:block;
    padding:12px;
    border:1px solid #ddd;
    margin-bottom:10px;
    border-radius:8px;
    cursor:pointer;
  }
  .option:hover { background:#f5f5f5; }
  .input {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
  }
  .btn {
    margin-top:20px;
    padding:12px;
    background:#081191;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
  }
`;

const styleEl = document.createElement("style");
styleEl.innerHTML = styles;
document.head.appendChild(styleEl);

function render() {
  if (step >= QUESTIONS.length) {
    sendToWhatsapp();
    return;
  }

  const q = QUESTIONS[step];

  let html = `<div class="card"><div class="title">${q.title}</div>`;

  if (q.type === "multiple") {
    q.options.forEach(opt => {
      html += `<div class="option" onclick="selectOption('${q.id}','${opt}')">${opt}</div>`;
    });
  }

  if (q.type === "text") {
    html += `<input class="input" id="input"/>`;
    html += `<button class="btn" onclick="nextText('${q.id}')">Continuar</button>`;
  }

  html += `</div>`;
  container.innerHTML = html;
}

window.selectOption = function(id, value) {
  responses[id] = value;
  step++;
  render();
}

window.nextText = function(id) {
  const val = document.getElementById("input").value;
  if (!val) return;
  responses[id] = val;
  step++;
  render();
}

function sendToWhatsapp() {
  let msg = "📋 Respuestas:%0A%0A";

  for (let q of QUESTIONS) {
    msg += "• " + q.title + ": " + (responses[q.id] || "") + "%0A";
  }

  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;
  window.location.href = url;
}

render();

})();
</script>
