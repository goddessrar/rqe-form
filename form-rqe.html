      if(input){input.addEventListener('input',function(){textInputs[q.id]=this.value;});input.addEventListener('keypress',function(e){if(e.key==='Enter'&&!e.shiftKey&&this.tagName!=='TEXTAREA'){e.preventDefault();handleNext();}});}
      var prevBtn=container.querySelector('.ff-btn-prev'),nextBtn=container.querySelector('.ff-btn-next');
      if(prevBtn)prevBtn.addEventListener('click',function(){if(currentStep>0){currentStep--;render();}});
      if(nextBtn)nextBtn.addEventListener('click',handleNext);
    }

    function handleNext(){
      var q=QUESTIONS[currentStep];
      if(['short-text','long-text','email','lead-capture'].includes(q.type)){
        var val=textInputs[q.id]||'';
        if(val.trim())responses[q.id]={questionId:q.id,answer:val.trim(),score:10};
        else if(q.required)return;
      }
      if(q.required&&!responses[q.id])return;
      currentStep++;render();
    }

    function renderSuccess(){
      function normalizeWANum(n){var d=n.replace(/\D/g,'');if(!d)return'';if(d.startsWith('54'))d=d.substring(2);if(d.startsWith('9'))d=d.substring(1);if(d.startsWith('0'))d=d.substring(1);return'549'+d;}
      var totalScore=Object.values(responses).reduce(function(s,r){return s+(r.score||0);},0);
      trackEvent('Form_Finish',{form_id:FORM_ID,total_score:totalScore});
      saveEventToDb('form_submit');
      trackLeadTemperature(totalScore);
      var finalMessage=SUCCESS_CONFIG.whatsappMessage||formatWhatsAppMessage();
      if(SUCCESS_CONFIG.whatsappMessage&&SUCCESS_CONFIG.includeResponsesInWhatsapp)finalMessage+=formatResponsesList();
      var num=normalizeWANum(SUCCESS_CONFIG.whatsappNumber);
      var ctaUrl='https://wa.me/'+num+'?text='+encodeURIComponent(finalMessage);
      container.innerHTML='<div class="ff-card ff-animate"><div class="ff-redirecting"><div class="ff-redirecting-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg></div><h2>'+escapeHtml(T.redirecting)+'</h2><p>'+escapeHtml(T.redirectingMessage)+'</p></div></div>';
      submitToBackend().then(function(){
        setTimeout(function(){
          try{var w=window.open(ctaUrl,'_blank','noopener,noreferrer');if(!w||w.closed)window.location.href=ctaUrl;}catch(e){window.location.href=ctaUrl;}
        },500);
      });
    }

    function formatWhatsAppMessage(){var msg='📋 Respuestas del formulario:\n\n';QUESTIONS.forEach(function(q){var r=responses[q.id];if(r)msg+='• '+q.title+': '+r.answer+'\n';});if(submissionShortId)msg+='\n🆔 ID: '+submissionShortId;return msg;}
    function formatResponsesList(){var msg='\n\n📋 *Respuestas:*\n';QUESTIONS.forEach(function(q){var r=responses[q.id];if(r)msg+='• '+q.title+': '+r.answer+'\n';});if(submissionShortId)msg+='\n🆔 ID: '+submissionShortId;return msg;}

    async function submitToBackend(){
      var arr=Object.values(responses),total=arr.reduce(function(s,r){return s+(r.score||0);},0);
      try{var res=await fetch(SUPABASE_URL+'/functions/v1/submit-form',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY},body:JSON.stringify({formId:FORM_ID,responses:arr,totalScore:total,metaEventId:metaEventId,deviceInfo:{userAgent:navigator.userAgent,language:navigator.language}})});if(res.ok){var d=await res.json();if(d.shortId)submissionShortId=d.shortId;}}catch(e){console.error('Form submit error:',e);}
    }

    render();
  }

})();
</script>
